<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accounting – Multiple Choice Quiz</title>
    <meta name="description" content="Chapter-by-chapter multiple choice quiz for Accounting principles. Test your knowledge with instant feedback and explanations.">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg:  #0f0c29;
            --bg2: #302b63;
            --bg3: #24243e;
            --blue:   #60a5fa;
            --blue2:  #3b82f6;
            --green:  #34d399;
            --green2: #10b981;
            --gold:   #fbbf24;
            --gold2:  #f59e0b;
            --red:    #f87171;
            --red2:   #ef4444;
            --purple: #a78bfa;
            --text:   #f0f4ff;
            --muted:  #94a3b8;
            --card:   rgba(255,255,255,0.06);
            --border: rgba(255,255,255,0.11);
            --radius: 16px;
        }

        html { scroll-behavior: smooth; }

        body {
            font-family: 'Nunito', sans-serif;
            background: linear-gradient(135deg, var(--bg) 0%, var(--bg2) 50%, var(--bg3) 100%);
            min-height: 100vh;
            color: var(--text);
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 16px 12px 60px;
        }

        /* ── STARS ── */
        #stars-canvas {
            position: fixed; inset: 0;
            pointer-events: none; z-index: 0;
        }

        /* ── WRAPPER ── */
        .wrapper {
            position: relative; z-index: 1;
            width: 100%; max-width: 820px;
        }

        /* ── HEADER ── */
        .page-header {
            text-align: center;
            padding: 28px 0 20px;
            position: relative;
            min-height: 48px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .page-header .hamburger-btn {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
        }
        .page-badge {
            display: inline-block;
            background: linear-gradient(135deg, var(--blue2), var(--green2));
            color: #0f0c29;
            font-size: 0.72rem;
            font-weight: 800;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            padding: 4px 14px;
            border-radius: 999px;
            margin-bottom: 12px;
        }
        .page-title {
            font-size: clamp(1.7rem, 5vw, 2.7rem);
            font-weight: 900;
            background: linear-gradient(90deg, var(--blue), var(--green), var(--gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            filter: drop-shadow(0 0 18px rgba(96,165,250,0.35));
            line-height: 1.15;
        }
        .page-sub {
            font-size: 0.92rem;
            color: var(--muted);
            margin-top: 8px;
        }

        /* ── TAB NAV ── */
        .tab-nav {
            position: relative;
            z-index: 20;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 30px;
            padding: 3px;
            margin: 16px auto 26px auto;
            width: max-content;
            max-width: 95%;
            gap: 2px;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            box-shadow: 0 4px 24px rgba(0,0,0,0.25);
        }

        .tab-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            background: transparent;
            border: none;
            color: rgba(255, 255, 255, 0.5); /* muted silver/gray */
            font-family: 'Nunito', sans-serif;
            font-size: 0.82rem;
            font-weight: 700;
            padding: 8px 16px;
            border-radius: 26px;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.25, 0.8, 0.25, 1);
            white-space: nowrap;
            letter-spacing: 0.04em;
            text-decoration: none;
        }

        .tab-btn.active {
            background: rgba(45, 212, 191, 0.15); /* subtle translucent teal */
            color: #2dd4bf; /* vibrant translucent teal */
            box-shadow: inset 0 0 0 1px rgba(45, 212, 191, 0.25);
        }

        .tab-btn:hover:not(.active) {
            color: rgba(255, 255, 255, 0.9);
            background: rgba(255, 255, 255, 0.05);
        }

        @media (max-width: 600px) {
            .tab-btn {
                padding: 6px 12px;
                font-size: 0.74rem;
                flex-shrink: 0;
            }
            .tab-nav {
                gap: 2px;
                padding: 3px 6px;
                width: auto;
                max-width: 95%;
                margin-left: auto;
                margin-right: auto;
                justify-content: flex-start;
                overflow-x: auto;
                white-space: nowrap;
                -ms-overflow-style: none;
                scrollbar-width: none;
            }
            .tab-nav::-webkit-scrollbar {
                display: none;
            }
        }



        /* ========== SIDEBAR DRAWERS ========== */
        .sidebar-overlay {
            position: fixed;
            inset: 0;
            background-color: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(4px);
            z-index: 400;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .sidebar-overlay.open {
            opacity: 1;
            pointer-events: all;
        }

        .sidebar {
            position: fixed;
            top: 0;
            left: 0;
            width: 240px;
            height: 100%;
            background: linear-gradient(180deg, #16123f 0%, #0f0c29 100%);
            border-right: 1px solid rgba(255, 255, 255, 0.08);
            z-index: 500;
            transform: translateX(-100%);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            padding: 10px 0;
            box-shadow: 10px 0 30px rgba(0, 0, 0, 0.5);
        }

        .sidebar.open {
            transform: translateX(0);
        }

        .sidebar-logo-section {
            display: flex;
            align-items: center;
            padding: 0 16px 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            margin-bottom: 12px;
            height: 56px;
        }

        .sidebar-logo-section .hamburger-btn {
            position: static;
            transform: none;
            margin-right: 16px;
        }

        .sidebar-title {
            font-size: 1.1rem;
            font-weight: 800;
            background: linear-gradient(90deg, var(--blue2), var(--green2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.5px;
        }

        .sidebar-menu {
            display: flex;
            flex-direction: column;
            gap: 4px;
            overflow-y: auto;
            padding: 0 8px;
            flex-grow: 1;
        }

        /* YouTube-like chapter items */
        .ch-tab {
            background: transparent;
            border: none;
            color: var(--muted);
            font-family: 'Nunito', sans-serif;
            font-size: 0.92rem;
            font-weight: 700;
            padding: 12px 16px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
            text-align: left;
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            margin: 0;
        }

        .ch-tab:hover {
            color: var(--text);
            background: rgba(255, 255, 255, 0.06);
        }

        .ch-tab.active {
            background: rgba(96, 165, 250, 0.15) !important;
            color: var(--blue2) !important;
            font-weight: 800;
            box-shadow: none;
            transform: none;
        }

        .tab-badge {
            display: inline-block;
            background: rgba(255, 255, 255, 0.18);
            font-size: 0.65rem;
            padding: 2px 6px;
            border-radius: 99px;
            margin-left: 8px;
            font-weight: 900;
        }

        .ch-tab.active .tab-badge {
            background: rgba(96, 165, 250, 0.25);
            color: var(--blue2);
        }

        /* Hamburger button */
        .hamburger-btn {
            background: transparent;
            border: none;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            width: 40px;
            height: 40px;
            padding: 12px 10px;
            border-radius: 50%;
            z-index: 100;
            transition: background-color 0.2s;
        }

        .hamburger-btn:hover {
            background-color: rgba(255, 255, 255, 0.08);
        }

        .hamburger-btn span {
            display: block;
            width: 100%;
            height: 2px;
            background-color: var(--text);
            border-radius: 2px;
            transition: all 0.2s;
        }

        /* ── SCORE HUD ── */
        .score-hud {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .hud-box {
            background: rgba(255,255,255,0.07);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 10px 20px;
            text-align: center;
            backdrop-filter: blur(10px);
            min-width: 100px;
        }
        .hud-label {
            font-size: 0.64rem;
            font-weight: 700;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }
        .hud-value {
            font-size: 1.5rem;
            font-weight: 900;
            line-height: 1.1;
        }

        /* ── PROGRESS BAR ── */
        .progress-wrap {
            margin-bottom: 22px;
        }
        .progress-top {
            display: flex;
            justify-content: space-between;
            font-size: 0.72rem;
            font-weight: 700;
            color: var(--muted);
            margin-bottom: 5px;
        }
        .progress-track {
            height: 10px;
            background: rgba(255,255,255,0.08);
            border-radius: 99px;
            overflow: hidden;
            border: 1px solid var(--border);
        }
        .progress-fill {
            height: 100%;
            border-radius: 99px;
            background: linear-gradient(90deg, var(--green), var(--blue));
            transition: width 0.5s cubic-bezier(0.34,1.56,0.64,1);
            box-shadow: 0 0 10px var(--green2);
        }

        /* ── QUESTION CARD ── */
        .q-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 22px;
            padding: 30px 32px 26px;
            margin-bottom: 14px;
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 32px rgba(0,0,0,0.35);
            transition: box-shadow 0.3s;
            animation: cardDrop 0.4s cubic-bezier(0.34,1.4,0.64,1) both;
        }
        @keyframes cardDrop {
            from { opacity:0; transform:translateY(24px) scale(0.97); }
            to   { opacity:1; transform:translateY(0) scale(1); }
        }

        .q-meta {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 14px;
        }
        .q-num {
            background: linear-gradient(135deg, var(--blue2), var(--purple));
            color: #fff;
            font-size: 0.7rem;
            font-weight: 900;
            padding: 3px 10px;
            border-radius: 99px;
        }
        .q-lo {
            font-size: 0.7rem;
            color: var(--muted);
            font-weight: 700;
        }

        .q-text {
            font-size: clamp(0.98rem, 2.4vw, 1.1rem);
            font-weight: 700;
            line-height: 1.55;
            color: var(--text);
            margin-bottom: 20px;
        }

        /* ── ANSWER OPTIONS ── */
        .options {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 4px;
        }

        .option-btn {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            background: rgba(255,255,255,0.04);
            border: 2px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 12px 16px;
            cursor: pointer;
            font-family: 'Nunito', sans-serif;
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text);
            text-align: left;
            transition: all 0.18s cubic-bezier(0.34,1.3,0.64,1);
            line-height: 1.45;
        }
        .option-btn:hover:not(:disabled) {
            border-color: var(--blue);
            background: rgba(96,165,250,0.1);
            transform: translateX(4px);
        }

        .option-letter {
            flex-shrink: 0;
            width: 26px; height: 26px;
            border-radius: 50%;
            background: rgba(255,255,255,0.1);
            border: 2px solid rgba(255,255,255,0.2);
            display: flex; align-items: center; justify-content: center;
            font-size: 0.75rem;
            font-weight: 900;
            transition: all 0.18s;
        }

        /* States */
        .option-btn.correct {
            border-color: var(--green) !important;
            background: rgba(52,211,153,0.14) !important;
            transform: translateX(0) !important;
        }
        .option-btn.correct .option-letter {
            background: var(--green);
            border-color: var(--green);
            color: #0f0c29;
        }
        .option-btn.wrong {
            border-color: var(--red) !important;
            background: rgba(248,113,113,0.12) !important;
            animation: shake 0.4s ease;
        }
        .option-btn.wrong .option-letter {
            background: var(--red);
            border-color: var(--red);
            color: #fff;
        }
        .option-btn.dimmed {
            opacity: 0.38;
        }
        .option-btn:disabled { cursor: default; }

        @keyframes shake {
            0%,100% { transform: translateX(0); }
            20%      { transform: translateX(-8px); }
            40%      { transform: translateX(8px); }
            60%      { transform: translateX(-5px); }
            80%      { transform: translateX(5px); }
        }

        /* ── EXPLANATION BOX ── */
        .explanation {
            display: none;
            margin-top: 16px;
            padding: 16px 18px;
            border-radius: 12px;
            font-size: 0.88rem;
            line-height: 1.65;
            font-weight: 600;
            animation: fadeSlideIn 0.35s ease both;
        }
        @keyframes fadeSlideIn {
            from { opacity:0; transform:translateY(8px); }
            to   { opacity:1; transform:translateY(0); }
        }
        .explanation.show { display: block; }
        .explanation.correct-exp {
            background: rgba(52,211,153,0.1);
            border: 1px solid rgba(52,211,153,0.3);
            color: #a7f3d0;
        }
        .explanation.wrong-exp {
            background: rgba(248,113,113,0.08);
            border: 1px solid rgba(248,113,113,0.25);
            color: #fca5a5;
        }
        .explanation .exp-label {
            font-size: 0.7rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 6px;
            opacity: 0.7;
        }

        /* ── COMING SOON CARD ── */
        .coming-soon {
            text-align: center;
            padding: 60px 30px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 22px;
            backdrop-filter: blur(10px);
        }
        .coming-soon .cs-emoji { font-size: 3.5rem; margin-bottom: 14px; }
        .coming-soon h3 {
            font-size: 1.4rem; font-weight: 900;
            background: linear-gradient(135deg, var(--blue), var(--purple));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text; margin-bottom: 8px;
        }
        .coming-soon p { color: var(--muted); font-size: 0.9rem; }

        /* ── CHAPTER SUMMARY BANNER ── */
        .ch-summary {
            display: none;
            text-align: center;
            padding: 36px 28px;
            background: linear-gradient(135deg, rgba(52,211,153,0.1), rgba(96,165,250,0.1));
            border: 1px solid rgba(52,211,153,0.25);
            border-radius: 22px;
            margin-top: 10px;
            animation: fadeSlideIn 0.45s ease both;
        }
        .ch-summary.show { display: block; }
        .ch-summary .sum-emoji { font-size: 3.5rem; margin-bottom: 14px; }
        .ch-summary h3 { font-size: 1.8rem; font-weight: 900; color: var(--green); margin-bottom: 8px; }
        .ch-summary .sum-score { font-size: 3rem; font-weight: 900; color: var(--gold); margin: 10px 0; }
        .ch-summary p { color: var(--muted); margin-bottom: 22px; }
        .ch-summary .stars { font-size: 2.2rem; margin-bottom: 18px; }

        .btn-retry {
            background: linear-gradient(135deg, var(--blue2), var(--green2));
            color: #0f0c29;
            border: none;
            padding: 13px 34px;
            font-size: 1rem;
            font-weight: 900;
            border-radius: 50px;
            cursor: pointer;
            font-family: 'Nunito', sans-serif;
            transition: all 0.2s;
            box-shadow: 0 4px 20px rgba(96,165,250,0.35);
        }
        .btn-retry:hover { transform: scale(1.06); box-shadow: 0 8px 28px rgba(96,165,250,0.5); }

        /* ── FLOATING SCORE ── */
        .float-text {
            position: fixed;
            font-size: 1.5rem;
            font-weight: 900;
            pointer-events: none;
            z-index: 1000;
            animation: floatUp 0.9s ease-out forwards;
            text-shadow: 0 2px 8px rgba(0,0,0,0.6);
        }
        @keyframes floatUp {
            0%   { transform: translateY(0) scale(1); opacity: 1; }
            60%  { transform: translateY(-60px) scale(1.15); opacity: 1; }
            100% { transform: translateY(-110px) scale(0.8); opacity: 0; }
        }

        /* ── PARTICLES ── */
        .particle {
            position: fixed;
            border-radius: 50%;
            pointer-events: none;
            z-index: 999;
            animation: particleFly var(--dur,0.8s) ease-out forwards;
        }
        @keyframes particleFly {
            0%   { transform:translate(0,0) scale(1); opacity:1; }
            100% { transform:translate(var(--tx,0),var(--ty,0)) scale(0); opacity:0; }
        }

        /* ── RESPONSIVE ── */
        @media (max-width: 500px) {
            .q-card { padding: 20px 16px 18px; }
            .ch-tab {
                padding: 10px 14px !important;
                font-size: 0.88rem !important;
            }
        }
    </style>
</head>
<body>

<!-- Sidebar Overlay -->
<div id="sidebar-overlay" class="sidebar-overlay" onclick="toggleSidebar(false)"></div>

<!-- Sidebar Drawer -->
<aside id="sidebar" class="sidebar">
    <div class="sidebar-logo-section">
        <button class="hamburger-btn" onclick="toggleSidebar(false)" aria-label="Close Sidebar Menu">
            <span></span>
            <span></span>
            <span></span>
        </button>
        <span class="sidebar-title">Accounting Game</span>
    </div>
    <nav class="sidebar-menu" id="chapter-tabs"></nav>
</aside>

<canvas id="stars-canvas"></canvas>

<div class="wrapper">

    <!-- Navigation Tabs -->
    <nav class="tab-nav">
        <a class="tab-btn" href="index.html">⚡ Accounting Crush</a>
        <a class="tab-btn active" href="multiple_choice.html">📝 Multiple Choice</a>
        <a class="tab-btn" href="accounting_cycle.html">🔄 Accounting Cycle</a>
    </nav>

    <!-- Header -->
    <div class="page-header">
        <button id="hamburger-menu-btn" class="hamburger-btn" onclick="toggleSidebar(true)" aria-label="Open Sidebar Menu">
            <span></span>
            <span></span>
            <span></span>
        </button>
        <div class="page-badge">📝 Practice Quiz</div>
        <h1 class="page-title">Multiple Choice Questions</h1>
        <p class="page-sub">Select the best answer — get instant feedback &amp; explanations</p>
    </div>

    <!-- HUD -->
    <div class="score-hud">
        <div class="hud-box">
            <div class="hud-label">Correct</div>
            <div class="hud-value" id="hud-correct" style="color:var(--green)">0</div>
        </div>
        <div class="hud-box">
            <div class="hud-label">Wrong</div>
            <div class="hud-value" id="hud-wrong" style="color:var(--red)">0</div>
        </div>
    </div>

    <!-- Progress -->
    <div class="progress-wrap">
        <div class="progress-top">
            <span>Progress</span>
            <span id="progress-text">0 / 0 answered</span>
        </div>
        <div class="progress-track">
            <div class="progress-fill" id="progress-fill" style="width:0%"></div>
        </div>
    </div>

    <!-- Quiz Area -->
    <div id="quiz-area"></div>

    <!-- Chapter Summary -->
    <div class="ch-summary" id="ch-summary">
        <div class="sum-emoji">🏆</div>
        <h3>Chapter Complete!</h3>
        <div class="stars" id="sum-stars">⭐⭐⭐</div>
        <p id="sum-sub">Great work!</p>
        <button class="btn-retry" onclick="retryChapter()">🔄 Retry Chapter</button>
    </div>

</div>

<script>
/* =================================================================
   QUESTION DATA
================================================================= */
const chapters = {
    1: {
        title: "Chapter 1",
        questions: [
            {
                lo: "LO 1",
                text: "Which of the following is not a step in the accounting process?",
                options: [
                    "Identification.",
                    "Economic entity.",
                    "Recording.",
                    "Communication."
                ],
                answer: 1, // index b (0-based)
                explanation: "Economic entity is not one of the steps in the accounting process. The other choices are true because (a) identification is the first step in the accounting process, (c) recording is the second step in the accounting process, and (d) communication is the third and final step in the accounting process."
            },
            {
                lo: "LO 1",
                text: "Which of the following statements about users of accounting information is incorrect?",
                options: [
                    "Management is an internal user.",
                    "Taxing authorities are external users.",
                    "Present creditors are external users.",
                    "Regulatory authorities are internal users."
                ],
                answer: 3,
                explanation: "Regulatory authorities are external, not internal, users of accounting information. The other choices are true statements."
            },
            {
                lo: "LO 2",
                text: "The historical cost principle states that:",
                options: [
                    "Assets should be initially recorded at cost and adjusted when the fair value changes.",
                    "Activities of an entity are to be kept separate and distinct from its owner.",
                    "Assets should be recorded at their cost.",
                    "Only transaction data capable of being expressed in terms of money be included in the accounting records."
                ],
                answer: 2,
                explanation: "The historical cost principle states that assets should be recorded at their cost. The other choices are incorrect because (a) the historical cost principle does not say that assets should be adjusted for changes in fair value, (b) describes the economic entity assumption, and (d) describes the monetary unit assumption."
            },
            {
                lo: "LO 2",
                text: "Which of the following statements about basic assumptions is correct?",
                options: [
                    "Basic assumptions are the same as accounting principles.",
                    "The economic entity assumption states that there should be a particular unit of accountability.",
                    "The monetary unit assumption enables accounting to measure employee morale.",
                    "Partnerships are not economic entities."

/* =================================================================
   STATE
================================================================= */
let activeChapter = 1;
let answered = {};   // { qIndex: true/false }  for current chapter
let correct = 0;
let wrong   = 0;
const LETTERS = ['a','b','c','d','e'];

/* =================================================================
   STARS BG
================================================================= */
(function() {
    const canvas = document.getElementById('stars-canvas');
    const ctx = canvas.getContext('2d');
    let stars = [];
    function resize() {
        canvas.width  = window.innerWidth;
        canvas.height = window.innerHeight;
        stars = Array.from({ length: 140 }, () => ({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            r: Math.random() * 1.3 + 0.3,
            a: Math.random(),
            speed: Math.random() * 0.007 + 0.003
        }));
    }
    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        stars.forEach(s => {
            s.a += s.speed;
            const alpha = (Math.sin(s.a) + 1) / 2 * 0.8 + 0.1;
            ctx.beginPath();
            ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(200,220,255,${alpha})`;
            ctx.fill();
        });
        requestAnimationFrame(draw);
    }
    window.addEventListener('resize', resize);
    resize(); draw();
})();

/* =================================================================
   BUILD TABS
================================================================= */
function buildTabs() {
    const container = document.getElementById('chapter-tabs');
    container.innerHTML = '';
    for (let ch = 1; ch <= 9; ch++) {
        const btn = document.createElement('button');
        btn.className = 'ch-tab' + (ch === activeChapter ? ' active' : '');
        btn.id = `tab-ch${ch}`;
        const qCount = chapters[ch] ? chapters[ch].questions.length : 0;
        btn.innerHTML = `Ch ${ch}${qCount ? `<span class="tab-badge">${qCount}</span>` : ''}`;
        btn.onclick = () => switchChapter(ch);
        container.appendChild(btn);
    }
}

/* =================================================================
   SWITCH CHAPTER
================================================================= */
function toggleSidebar(open) {
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('sidebar-overlay');
    if (sidebar) sidebar.classList.toggle('open', open);
    if (overlay) overlay.classList.toggle('open', open);
}

function switchChapter(ch) {
    activeChapter = ch;
    answered = {};
    correct = 0; wrong = 0;
    updateHUD();
    buildTabs();
    renderQuiz();
    document.getElementById('ch-summary').classList.remove('show');
    toggleSidebar(false);
}

/* =================================================================
   RENDER QUIZ
================================================================= */
function renderQuiz() {
    const area = document.getElementById('quiz-area');
    const data = chapters[activeChapter];

    if (!data) {
        area.innerHTML = `
            <div class="coming-soon">
                <div class="cs-emoji">🚧</div>
                <h3>Coming Soon</h3>
                <p>Chapter ${activeChapter} questions are not yet loaded.<br>Add your questions and they'll appear here!</p>
            </div>`;
        updateProgress(0, 0);
        return;
    }

    area.innerHTML = '';
    data.questions.forEach((q, i) => {
        const card = document.createElement('div');
        card.className = 'q-card';
        card.id = `qcard-${i}`;
        card.style.animationDelay = `${i * 0.045}s`;

        card.innerHTML = `
            <div class="q-meta">
                <span class="q-num">Q${i + 1}</span>
                <span class="q-lo">${q.lo}</span>
            </div>
            <div class="q-text">${q.text}</div>
            <div class="options" id="opts-${i}">
                ${q.options.map((opt, oi) => `
                    <button class="option-btn" id="opt-${i}-${oi}" onclick="selectAnswer(${i}, ${oi})" data-qi="${i}" data-oi="${oi}">
                        <span class="option-letter">${LETTERS[oi]}</span>
                        <span>${opt}</span>
                    </button>
                `).join('')}
            </div>
            <div class="explanation" id="exp-${i}">
                <div class="exp-label" id="exp-label-${i}"></div>
                <div id="exp-text-${i}">${q.explanation}</div>
            </div>
        `;
        area.appendChild(card);
    });

    updateProgress(0, data.questions.length);
}

/* =================================================================
   SELECT ANSWER
================================================================= */
function selectAnswer(qi, oi) {
    if (answered[qi]) return;
    answered[qi] = true;

    const data = chapters[activeChapter];
    const q    = data.questions[qi];
    const isCorrect = (oi === q.answer);

    // Disable all options in this question
    const opts = document.querySelectorAll(`#opts-${qi} .option-btn`);
    opts.forEach((btn, idx) => {
        btn.disabled = true;
        if (idx === q.answer) {
            btn.classList.add('correct');
        } else if (idx === oi && !isCorrect) {
            btn.classList.add('wrong');
        } else {
            btn.classList.add('dimmed');
        }
    });

    // Explanation
    const exp      = document.getElementById(`exp-${qi}`);
    const expLabel = document.getElementById(`exp-label-${qi}`);
    expLabel.textContent = isCorrect ? '✅ Correct!' : '❌ Incorrect';
    exp.classList.add('show', isCorrect ? 'correct-exp' : 'wrong-exp');

    // State & particles
    if (isCorrect) {
        correct++;
        const btn = document.getElementById(`opt-${qi}-${oi}`);
        const rect = btn.getBoundingClientRect();
        spawnParticles(rect.left + rect.width / 2, rect.top + rect.height / 2, '#34d399');
    } else {
        wrong++;
    }

    updateHUD();
    updateProgress(Object.keys(answered).length, data.questions.length);

    // Scroll to next unanswered or show summary
    setTimeout(() => {
        if (Object.keys(answered).length === data.questions.length) {
            showSummary();
        } else {
            // Find next unanswered card and scroll to it
            for (let i = qi + 1; i < data.questions.length; i++) {
                if (!answered[i]) {
                    document.getElementById(`qcard-${i}`).scrollIntoView({ behavior: 'smooth', block: 'center' });
                    break;
                }
            }
        }
    }, 500);
}

/* =================================================================
   HUD & PROGRESS
================================================================= */
function updateHUD() {
    const corEl = document.getElementById('hud-correct');
    if (corEl) corEl.textContent = correct;
    const wrgEl = document.getElementById('hud-wrong');
    if (wrgEl) wrgEl.textContent = wrong;
}

function updateProgress(done, total) {
    const pct = total ? (done / total * 100) : 0;
    document.getElementById('progress-fill').style.width = pct + '%';
    document.getElementById('progress-text').textContent = `${done} / ${total} answered`;
}

/* =================================================================
   CHAPTER SUMMARY
================================================================= */
function showSummary() {
    const data  = chapters[activeChapter];
    const total = data.questions.length;
    const pct   = correct / total;
    const stars = pct >= 0.9 ? '⭐⭐⭐' : pct >= 0.7 ? '⭐⭐' : '⭐';
    const msgs  = [
        'Keep practicing — you\'ll get there!',
        'Good effort! Review the explanations above.',
        'Nice work! You\'re getting the hang of it.',
        'Great job! Keep that momentum going!',
        '🔥 Perfect score! You crushed it!'
    ];
    const msgIdx = pct >= 1 ? 4 : pct >= 0.8 ? 3 : pct >= 0.6 ? 2 : pct >= 0.4 ? 1 : 0;

    document.getElementById('sum-stars').textContent = stars;
    document.getElementById('sum-sub').textContent   = `${correct}/${total} correct — ${msgs[msgIdx]}`;
    document.getElementById('ch-summary').classList.add('show');
    document.getElementById('ch-summary').scrollIntoView({ behavior: 'smooth', block: 'center' });

    // Celebrate on high score
    if (pct >= 0.8) {
        setTimeout(() => { spawnParticles(window.innerWidth/2, window.innerHeight/2, '#fbbf24', 28); }, 100);
        setTimeout(() => { spawnParticles(window.innerWidth/2, window.innerHeight/2, '#34d399', 20); }, 400);
    }
}

function retryChapter() {
    switchChapter(activeChapter);
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

/* =================================================================
   PARTICLES & FLOAT TEXT
================================================================= */
function spawnParticles(x, y, color, count = 14) {
    for (let i = 0; i < count; i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        const size  = Math.random() * 10 + 5;
        const angle = Math.random() * Math.PI * 2;
        const dist  = Math.random() * 100 + 30;
        p.style.cssText = `
            width:${size}px; height:${size}px;
            left:${x}px; top:${y}px;
            background:${color};
            --tx:${Math.cos(angle)*dist}px;
            --ty:${Math.sin(angle)*dist}px;
            --dur:${0.5 + Math.random()*0.5}s;
            box-shadow:0 0 6px ${color};
        `;
        document.body.appendChild(p);
        setTimeout(() => p.remove(), 1100);
    }
}

function floatText(x, y, text, color) {
    const el = document.createElement('div');
    el.className = 'float-text';
    el.textContent = text;
    el.style.cssText = `left:${x}px; top:${y}px; color:${color};`;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 1000);
}

/* =================================================================
   INIT
================================================================= */
buildTabs();
renderQuiz();
</script>
